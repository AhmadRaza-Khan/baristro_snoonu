name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: 187.77.189.250
          username: root
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /var/www/app

            git pull origin main

            npm install
            npm run build:css
            npx prisma generate
            npx prisma migrate deploy


            npm run build

            pm2 start dist/main.js --name nest-app
            pm2 save